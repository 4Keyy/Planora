name: CI
on:
  push:
    branches: [main, 'audit/**', 'fix/**', 'claude/**']
  pull_request:
    branches: [main]

# Minimum permissions. Each job only receives what it needs.
permissions:
  contents: read

# Cancel in-progress runs for the same branch to avoid wasted compute.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v20
      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress README.md CHANGELOG.md CONTRIBUTING.md SECURITY.md TESTING.md ARCHITECTURE.md 'docs/**/*.md'
          fail: true

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
      - run: dotnet restore Planora.sln
      - run: dotnet build Planora.sln --no-restore --configuration Release
      - run: dotnet test Planora.sln --no-build --configuration Release --collect:"XPlat Code Coverage" --settings coverage.runsettings --results-directory ./coverage/backend
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: ./coverage/backend

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json
      - run: rm -f package-lock.json && npm install
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test:coverage
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage
