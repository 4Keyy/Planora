name: E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/e2e.yml'
      - 'BuildingBlocks/**'
      - 'GrpcContracts/**'
      - 'Planora.ApiGateway/**'
      - 'Services/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - 'postgres/**'

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auth-todos-sharing-hidden:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Create e2e environment
        shell: bash
        run: |
          {
            echo "POSTGRES_PASSWORD=$(openssl rand -hex 24)"
            echo "REDIS_PASSWORD=$(openssl rand -hex 24)"
            echo "RABBITMQ_USER=planora_e2e"
            echo "RABBITMQ_PASSWORD=$(openssl rand -hex 24)"
            echo "JWT_SECRET=$(openssl rand -base64 64)"
            echo "GRPC_SERVICE_KEY=$(openssl rand -base64 32)"
            echo "NEXT_PUBLIC_API_URL=http://127.0.0.1:5132"
          } > .env.e2e

      - name: Start Docker stack
        run: docker compose --env-file .env.e2e up -d --build

      - name: Wait for gateway health checks
        shell: bash
        run: |
          endpoints=(
            "http://127.0.0.1:5132/health"
            "http://127.0.0.1:5132/auth/health"
            "http://127.0.0.1:5132/categories/health"
            "http://127.0.0.1:5132/todos/health"
            "http://127.0.0.1:5132/messaging/health"
            "http://127.0.0.1:5132/realtime/health"
          )

          for endpoint in "${endpoints[@]}"; do
            echo "Waiting for ${endpoint}"
            for attempt in {1..90}; do
              if curl --fail --silent --show-error "${endpoint}" > /dev/null; then
                break
              fi

              if [ "${attempt}" -eq 90 ]; then
                docker compose --env-file .env.e2e ps
                docker compose --env-file .env.e2e logs --tail=200
                exit 1
              fi

              sleep 2
            done
          done

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Playwright e2e
        run: npm run e2e
        working-directory: frontend
        env:
          E2E_API_URL: http://127.0.0.1:5132
          E2E_AUTH_LOG_CONTAINER: planora-auth-api

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results/playwright

      - name: Stop Docker stack
        if: always()
        run: docker compose --env-file .env.e2e down --remove-orphans
