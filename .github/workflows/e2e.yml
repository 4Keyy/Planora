name: E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
    paths:
      - '.github/workflows/e2e.yml'
      - 'BuildingBlocks/**'
      - 'GrpcContracts/**'
      - 'Planora.ApiGateway/**'
      - 'Services/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - 'postgres/**'

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auth-todos-sharing-hidden:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Create e2e environment
        shell: bash
        run: |
          {
            echo "POSTGRES_PASSWORD=$(openssl rand -hex 24)"
            echo "REDIS_PASSWORD=$(openssl rand -hex 24)"
            echo "RABBITMQ_USER=planora_e2e"
            echo "RABBITMQ_PASSWORD=$(openssl rand -hex 24)"
            echo "JWT_SECRET=$(openssl rand -hex 64)"
            echo "GRPC_SERVICE_KEY=$(openssl rand -hex 32)"
            echo "NEXT_PUBLIC_API_URL=http://127.0.0.1:5132"
          } > .env.e2e

      - name: Start Docker stack
        run: docker compose --env-file .env.e2e up -d --build

      - name: Wait for gateway health checks
        shell: bash
        run: |
          endpoints=(
            "http://127.0.0.1:5132/health"
            "http://127.0.0.1:5132/auth/health"
            "http://127.0.0.1:5132/categories/health"
            "http://127.0.0.1:5132/todos/health"
            "http://127.0.0.1:5132/messaging/health"
            "http://127.0.0.1:5132/realtime/health"
          )

          for endpoint in "${endpoints[@]}"; do
            echo "Waiting for ${endpoint}"
            for attempt in {1..90}; do
              if curl --fail --silent --show-error "${endpoint}" > /dev/null; then
                break
              fi

              if [ "${attempt}" -eq 90 ]; then
                docker compose --env-file .env.e2e ps
                docker compose --env-file .env.e2e logs --tail=200
                exit 1
              fi

              sleep 2
            done
          done

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      # T2.6 — install Chromium for browser-rendered UI specs. The chromium
      # binary is cached by setup-node along with the npm cache; first run
      # downloads it (~150 MB), subsequent runs hit the cache.
      - name: Install Playwright browsers (chromium)
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      # T2.6 — build + start the Next.js frontend so the `ui` project can
      # drive a real browser against it. The dev server is intentionally not
      # used: dev mode has different hydration timing and Webpack overlays
      # that interfere with Playwright.
      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:5132

      - name: Start frontend (background) and wait for readiness
        shell: bash
        working-directory: frontend
        run: |
          NEXT_PUBLIC_API_URL=http://127.0.0.1:5132 \
            nohup npm run start -- -p 3000 > ../frontend-server.log 2>&1 &
          echo $! > ../frontend.pid
          for attempt in {1..60}; do
            if curl --fail --silent --show-error "http://127.0.0.1:3000" > /dev/null; then
              echo "Frontend ready after ${attempt} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend failed to start; tailing log:"
          tail -200 ../frontend-server.log
          exit 1

      - name: Run Playwright e2e (api + ui projects)
        run: npm run e2e
        working-directory: frontend
        env:
          E2E_API_URL: http://127.0.0.1:5132
          E2E_FRONTEND_URL: http://127.0.0.1:3000
          E2E_AUTH_LOG_CONTAINER: planora-auth-api

      - name: Stop frontend
        if: always()
        shell: bash
        run: |
          if [ -f frontend.pid ]; then
            pid=$(cat frontend.pid)
            kill "$pid" 2>/dev/null || true
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results/playwright

      - name: Stop Docker stack
        if: always()
        run: docker compose --env-file .env.e2e down --remove-orphans
