name: Security Scan
on:
  push:
    branches: [main, 'audit/**', 'fix/**', 'claude/**']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'  # Every Monday 2am

permissions:
  contents: read
  security-events: write  # SARIF upload — gitleaks, CodeQL, Trivy
  actions: read           # CodeQL needs to read workflow run metadata

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dotnet-vuln:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '9.0.x'
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props
            Directory.Build.props
      - run: dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt; grep -i "has the following vulnerable packages" vuln-report.txt && exit 1 || exit 0

  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high

  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # build-mode is per-language: csharp uses autobuild so CodeQL can run the
        # data-flow taint queries that need the compiled IL (the dataflow precision
        # buildless mode cannot reach); javascript-typescript stays buildless because
        # its extractor does not need a build step.
        include:
          - language: csharp
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # C# autobuild needs the .NET SDK on PATH. Cache so the second build
      # (during analyze) reuses the NuGet restore from the first.
      - if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '9.0.x'
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props
            Directory.Build.props

      - name: Initialize CodeQL
        uses: github/codeql-action/init@f52b05f4acaaa234e44466e66d29050e135ea9ef # v4.36.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@f52b05f4acaaa234e44466e66d29050e135ea9ef # v4.36.0
        with:
          category: "/language:${{ matrix.language }}"

  trivy-iac:
    name: Trivy IaC & Dockerfile scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Trivy misconfiguration scan (SARIF for Security tab)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-iac.sarif
          severity: CRITICAL,HIGH,MEDIUM
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@f52b05f4acaaa234e44466e66d29050e135ea9ef # v4.36.0
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac
      - name: Trivy fail-on-high (HIGH + CRITICAL block CI)
        # Two-pass: the first run produces SARIF for the Security tab (which
        # cannot fail the job), the second blocks the PR on HIGH/CRITICAL.
        # MEDIUM is intentionally informational — Trivy is noisy at that level.
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '9.0.x'
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props
            Directory.Build.props

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install CycloneDX .NET tool
        run: dotnet tool install --global CycloneDX

      - name: Generate backend SBOM
        # Skips test projects, restores transitively, emits one SBOM per project plus a merged top-level one.
        run: |
          mkdir -p sbom/backend
          dotnet CycloneDX Planora.sln \
            --output sbom/backend \
            --exclude-test-projects \
            --json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Generate frontend SBOM
        run: |
          mkdir -p ../sbom/frontend
          npx --yes @cyclonedx/cyclonedx-npm --output-format JSON --output-file ../sbom/frontend/planora-frontend.cdx.json
        working-directory: frontend

      - name: Validate SBOM presence
        run: |
          set -e
          ls -la sbom/backend
          ls -la sbom/frontend
          # Fail the job if either SBOM ended up empty.
          test -s sbom/frontend/planora-frontend.cdx.json
          # Backend tool emits per-project files — at least one must exist.
          if [ -z "$(ls -A sbom/backend)" ]; then
            echo "::error::Backend SBOM directory is empty"
            exit 1
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: sbom/
          retention-days: 90
