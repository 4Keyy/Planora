# Fly.io app manifest — Auth API.
# Internal-only (no public HTTP service); reached via planora-auth.internal:443.

app = "planora-auth"
primary_region = "ams"

[build]
  dockerfile = "../../Services/AuthApi/Planora.Auth.Api/Dockerfile"

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ASPNETCORE_URLS = "http://+:8080"
  ASPNETCORE_WEBROOT = "/data/uploads"
  JwtSettings__Issuer = "Planora.Auth"
  JwtSettings__Audience = "Planora.Clients"
  RateLimiting__Backend = "Redis"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 250

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health/live"

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "45s"
    method = "GET"
    path = "/health/ready"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# SECURITY/DURABILITY: avatar uploads land under /data/uploads, which is backed
# by a Fly volume so files survive deploys, scale-down, and machine moves.
# Without this mount the WebRoot is on the ephemeral container filesystem and
# every user's avatar disappears on the next "fly deploy". Pair with
# ASPNETCORE_WEBROOT=/data/uploads in [env] so Kestrel actually writes there.
#
# Bootstrap (per region):
#   fly volumes create planora_auth_uploads -a planora-auth -r ams -s 3
# Multi-region replicas: create one volume per region, all named the same.
# See deploy/fly/README.md for the canonical procedure.
[mounts]
  source = "planora_auth_uploads"
  destination = "/data/uploads"
  initial_size = "3gb"
