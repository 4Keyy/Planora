# Fly.io app manifest — Category API.
# Internal-only; reached via planora-category.internal:443.

app = "planora-category"
primary_region = "ams"

[build]
  dockerfile = "../../Services/CategoryApi/Planora.Category.Api/Dockerfile"

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ASPNETCORE_URLS = "http://+:8080"
  JwtSettings__Issuer = "Planora.Auth"
  JwtSettings__Audience = "Planora.Clients"
  RateLimiting__Backend = "Redis"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 250

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health/live"

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "45s"
    method = "GET"
    path = "/health/ready"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
