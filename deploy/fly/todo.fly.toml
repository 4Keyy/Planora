# Fly.io app manifest — Todo API.
# Internal-only; reached via planora-todo.internal:443.
# Depends on planora-auth and planora-category via gRPC.

app = "planora-todo"
primary_region = "ams"

[build]
  dockerfile = "../../Services/TodoApi/Planora.Todo.Api/Dockerfile"

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ASPNETCORE_URLS = "http://+:8080"
  JwtSettings__Issuer = "Planora.Auth"
  JwtSettings__Audience = "Planora.Clients"
  RateLimiting__Backend = "Redis"
  # gRPC dependencies over the Fly private network. Without these the Todo service falls back to
  # localhost defaults and cannot resolve categories or friendships in production.
  GrpcServices__AuthApi = "https://planora-auth.internal:443"
  GrpcServices__CategoryApi = "https://planora-category.internal:443"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 250

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health/live"

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/health/ready"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
