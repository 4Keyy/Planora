# Fly.io app manifest — Planora API Gateway (Ocelot).
# Public HTTP edge. The only Planora app that accepts external traffic.

app = "planora-gateway"
primary_region = "ams"

[build]
  dockerfile = "../../Planora.ApiGateway/Dockerfile"

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ASPNETCORE_URLS = "http://+:8080"
  # Per-service defaults — secrets layer in via `flyctl secrets set`.
  JwtSettings__Issuer = "Planora.Auth"
  JwtSettings__Audience = "Planora.Clients"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"           # Edge stays warm; minimum 1 machine.
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 500

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health/live"

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health/ready"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[metrics]
  port = 8080
  path = "/metrics"   # Reserved — Prometheus scrape endpoint, wired in Phase 1 T1.2 follow-up
